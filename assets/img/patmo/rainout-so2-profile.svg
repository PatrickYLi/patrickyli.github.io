<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">SO2 rainout rate profile from Rainout-SO2.txt</title>
  <desc id="desc">A scientific line plot of K_RAIN for SO2 versus altitude from 1 to 12 km. K_RAIN decreases from about 6.27e-7 s^-1 near 1 km to about 3.26e-9 s^-1 near 12 km.</desc>
  <rect width="920" height="620" fill="#fffaf2"/>
  <rect x="88" y="48" width="760" height="500" rx="6" fill="#ffffff" stroke="#d8cdbd" stroke-width="1.5"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#18242d">SO<tspan baseline-shift="sub" font-size="16">2</tspan> Rainout Rate Profile</text>
  <text x="460" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5d6c75">Data source: tests/modern_sulfur_cycle/Rainout-SO2.txt</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#31424c">
    <line x1="140" y1="510" x2="780" y2="510" stroke="#21303a" stroke-width="2"/>
    <line x1="140" y1="90" x2="140" y2="510" stroke="#21303a" stroke-width="2"/>

    <g stroke="#e1d6c6" stroke-width="1">
      <line x1="353.3" y1="90" x2="353.3" y2="510"/>
      <line x1="566.7" y1="90" x2="566.7" y2="510"/>
      <line x1="780" y1="90" x2="780" y2="510"/>
      <line x1="140" y1="433.6" x2="780" y2="433.6"/>
      <line x1="140" y1="319.1" x2="780" y2="319.1"/>
      <line x1="140" y1="204.5" x2="780" y2="204.5"/>
      <line x1="140" y1="90" x2="780" y2="90"/>
    </g>

    <g stroke="#21303a" stroke-width="1.5">
      <line x1="140" y1="510" x2="140" y2="517"/>
      <line x1="353.3" y1="510" x2="353.3" y2="517"/>
      <line x1="566.7" y1="510" x2="566.7" y2="517"/>
      <line x1="780" y1="510" x2="780" y2="517"/>
      <line x1="133" y1="510" x2="140" y2="510"/>
      <line x1="133" y1="433.6" x2="140" y2="433.6"/>
      <line x1="133" y1="319.1" x2="140" y2="319.1"/>
      <line x1="133" y1="204.5" x2="140" y2="204.5"/>
      <line x1="133" y1="90" x2="140" y2="90"/>
    </g>

    <text x="140" y="538" text-anchor="middle">10<tspan baseline-shift="super" font-size="10">-9</tspan></text>
    <text x="353.3" y="538" text-anchor="middle">10<tspan baseline-shift="super" font-size="10">-8</tspan></text>
    <text x="566.7" y="538" text-anchor="middle">10<tspan baseline-shift="super" font-size="10">-7</tspan></text>
    <text x="780" y="538" text-anchor="middle">10<tspan baseline-shift="super" font-size="10">-6</tspan></text>

    <text x="118" y="514" text-anchor="end">1</text>
    <text x="118" y="438" text-anchor="end">3</text>
    <text x="118" y="323" text-anchor="end">6</text>
    <text x="118" y="209" text-anchor="end">9</text>
    <text x="118" y="94" text-anchor="end">12</text>
  </g>

  <text x="460" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#18242d">K<tspan baseline-shift="sub" font-size="11">RAIN</tspan> (s<tspan baseline-shift="super" font-size="11">-1</tspan>, log scale)</text>
  <text x="42" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#18242d" transform="rotate(-90 42 300)">Altitude ZKM (km)</text>

  <polyline points="736.8,510.0 708.3,471.8 674.4,433.6 640.3,395.5 604.9,357.3 566.4,319.1 524.5,280.9 477.7,242.7 427.2,204.5 371.9,166.4 312.3,128.2 249.5,90.0" fill="none" stroke="#0f5f73" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#0f5f73" stroke="#ffffff" stroke-width="2">
    <circle cx="736.8" cy="510.0" r="5"/>
    <circle cx="708.3" cy="471.8" r="5"/>
    <circle cx="674.4" cy="433.6" r="5"/>
    <circle cx="640.3" cy="395.5" r="5"/>
    <circle cx="604.9" cy="357.3" r="5"/>
    <circle cx="566.4" cy="319.1" r="5"/>
    <circle cx="524.5" cy="280.9" r="5"/>
    <circle cx="477.7" cy="242.7" r="5"/>
    <circle cx="427.2" cy="204.5" r="5"/>
    <circle cx="371.9" cy="166.4" r="5"/>
    <circle cx="312.3" cy="128.2" r="5"/>
    <circle cx="249.5" cy="90.0" r="5"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="14">
    <rect x="560" y="102" width="245" height="62" rx="6" fill="#fffaf2" stroke="#d8cdbd"/>
    <line x1="580" y1="127" x2="625" y2="127" stroke="#0f5f73" stroke-width="4" stroke-linecap="round"/>
    <circle cx="602.5" cy="127" r="5" fill="#0f5f73" stroke="#ffffff" stroke-width="2"/>
    <text x="640" y="132" fill="#18242d">K<tspan baseline-shift="sub" font-size="10">RAIN</tspan> for SO<tspan baseline-shift="sub" font-size="10">2</tspan></text>
    <text x="580" y="151" fill="#5d6c75" font-size="12">first-order wet-deposition rate</text>
  </g>
</svg>
