<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="1735" viewBox="0 0 1260 1735" role="img" aria-labelledby="title desc">
<title id="title">PATMO architecture overview</title>
<desc id="desc">Static workflow diagram of PATMO showing inputs, Python preprocessing and code generation, build products, Fortran runtime, and outputs.</desc>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7b8b93"/></marker></defs>
<rect x="0" y="0" width="1260" height="1735" rx="0" fill="#fffaf2" stroke="none" stroke-width="0"/>
<text x="630.0" y="42" text-anchor="middle" font-family="Baskerville, Palatino, serif" font-size="32" font-weight="700" fill="#18242d">PATMO Architecture Overview</text>
<text x="630.0" y="72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#5d6c75">
<tspan x="630.0" dy="0">From case inputs to generated Fortran code, runtime integration, and scientific outputs</tspan>
</text>
<rect x="70" y="110" width="1120" height="215" rx="22" fill="#f6eee1" stroke="#d3bf9c" stroke-width="1.6"/>
<text x="630.0" y="142" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#18242d">1. Inputs</text>
<rect x="110" y="168" width="330" height="120" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="275.0" y="198" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="275.0" dy="0">Case directory</tspan>
<tspan x="275.0" dy="20">tests/&lt;case&gt;/</tspan>
<tspan x="275.0" dy="20">settings / profile / solar flux /</tspan>
<tspan x="275.0" dy="20">reaction network / test.f90</tspan>
</text>
<rect x="465" y="168" width="330" height="120" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="630.0" y="198" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="630.0" dy="0">Chemistry databases</tspan>
<tspan x="630.0" dy="20">KIDA reactions</tspan>
<tspan x="630.0" dy="20">thermochemistry</tspan>
<tspan x="630.0" dy="20">reference masses</tspan>
</text>
<rect x="820" y="168" width="330" height="120" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="985.0" y="198" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="985.0" dy="0">Photochemistry data</tspan>
<tspan x="985.0" dy="20">cross sections</tspan>
<tspan x="985.0" dy="20">photo bins</tspan>
<tspan x="985.0" dy="20">wavelength-dependent inputs</tspan>
</text>
<rect x="70" y="370" width="1120" height="355" rx="22" fill="#e9f3f0" stroke="#9dc0b7" stroke-width="1.6"/>
<text x="630.0" y="402" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#18242d">2. Python Preprocessing and Code Generation</text>
<rect x="115" y="438" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="270.0" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="270.0" dy="0">patmo</tspan>
<tspan x="270.0" dy="20">top-level entry script</tspan>
</text>
<rect x="475" y="438" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="630.0" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="630.0" dy="0">patmo_test + patmo_options</tspan>
<tspan x="630.0" dy="20">copy case files and read settings</tspan>
</text>
<rect x="835" y="438" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="990.0" y="472" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="990.0" dy="0">patmo_network</tspan>
<tspan x="990.0" dy="20">build species and reactions</tspan>
<tspan x="990.0" dy="20">reverse reactions</tspan>
<tspan x="990.0" dy="20">write ODE code</tspan>
</text>
<rect x="115" y="575" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="270.0" y="609" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="270.0" dy="0">patmo_photochemistry</tspan>
<tspan x="270.0" dy="20">interpolate cross sections</tspan>
<tspan x="270.0" dy="20">build photo data</tspan>
</text>
<rect x="475" y="575" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="630.0" y="609" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="630.0" dy="0">Template replacement</tspan>
<tspan x="630.0" dy="20">fill src_f90 templates</tspan>
<tspan x="630.0" dy="20">with case-specific code</tspan>
</text>
<rect x="835" y="575" width="310" height="100" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="990.0" y="609" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#31424c">
<tspan x="990.0" dy="0">Generated code writer</tspan>
<tspan x="990.0" dy="20">rates, Jacobian, sparsity</tspan>
<tspan x="990.0" dy="20">commons and main modules</tspan>
</text>
<line x1="270" y1="538" x2="270" y2="575" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="630" y1="538" x2="630" y2="575" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="990" y1="538" x2="990" y2="575" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="425" y1="488" x2="475" y2="488" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="785" y1="488" x2="835" y2="488" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="425" y1="625" x2="475" y2="625" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="785" y1="625" x2="835" y2="625" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="70" y="770" width="1120" height="260" rx="22" fill="#f4efe6" stroke="#c8bba5" stroke-width="1.6"/>
<text x="630.0" y="802" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#18242d">3. build/ Products</text>
<rect x="110" y="845" width="330" height="135" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="275.0" y="873" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="275.0" dy="0">Generated modules</tspan>
<tspan x="275.0" dy="20">patmo.f90 / patmo_ode.f90</tspan>
<tspan x="275.0" dy="20">rates / photoRates / reverseRates</tspan>
<tspan x="275.0" dy="20">jacobian / sparsity / utils</tspan>
</text>
<rect x="465" y="845" width="330" height="135" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="630.0" y="873" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="630.0" dy="0">Fixed runtime modules</tspan>
<tspan x="630.0" dy="20">constants / parameters</tspan>
<tspan x="630.0" dy="20">Makefile</tspan>
<tspan x="630.0" dy="20">optional volcano module</tspan>
</text>
<rect x="820" y="845" width="330" height="135" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="985.0" y="873" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="985.0" dy="0">Runtime data copied into build/</tspan>
<tspan x="985.0" dy="20">profile.dat / solar_flux.txt / test.f90</tspan>
<tspan x="985.0" dy="20">xsecs and photoMetric data</tspan>
<tspan x="985.0" dy="20">DLSODES solver sources</tspan>
</text>
<rect x="70" y="1075" width="1120" height="420" rx="22" fill="#e9eef6" stroke="#a8b7d1" stroke-width="1.6"/>
<text x="630.0" y="1107" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#18242d">4. Fortran Runtime</text>
<rect x="170" y="1150" width="250" height="82" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="295" y="1184" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#31424c">
<tspan x="295" dy="0">test.f90</tspan>
<tspan x="295" dy="20">case driver</tspan>
</text>
<rect x="505" y="1150" width="250" height="82" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="630" y="1184" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#31424c">
<tspan x="630" dy="0">patmo_init</tspan>
<tspan x="630" dy="20">load profiles</tspan>
<tspan x="630" dy="20">photo data and arrays</tspan>
</text>
<rect x="840" y="1150" width="250" height="82" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="965" y="1184" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#31424c">
<tspan x="965" dy="0">patmo_run</tspan>
<tspan x="965" dy="20">advance one time step</tspan>
<tspan x="965" dy="20">solve with DLSODES</tspan>
</text>
<line x1="420" y1="1191" x2="505" y2="1191" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="755" y1="1191" x2="840" y2="1191" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="110" y="1288" width="250" height="130" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="235.0" y="1320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="235.0" dy="0">ODE core</tspan>
<tspan x="235.0" dy="20">chemistry + diffusion</tspan>
<tspan x="235.0" dy="20">deposition / emissions</tspan>
</text>
<rect x="390" y="1288" width="250" height="130" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="515.0" y="1320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="515.0" dy="0">Photo module</tspan>
<tspan x="515.0" dy="20">opacity, flux, J values</tspan>
<tspan x="515.0" dy="20">cross-section handling</tspan>
</text>
<rect x="670" y="1288" width="250" height="130" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="795.0" y="1320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="795.0" dy="0">Rate modules</tspan>
<tspan x="795.0" dy="20">forward and reverse rates</tspan>
<tspan x="795.0" dy="20">temperature dependence</tspan>
</text>
<rect x="950" y="1288" width="200" height="130" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="1050.0" y="1320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="1050.0" dy="0">Jacobian and sparsity</tspan>
<tspan x="1050.0" dy="20">solver structure</tspan>
<tspan x="1050.0" dy="20">diagnostics</tspan>
</text>
<line x1="965" y1="1232" x2="235" y2="1288" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="965" y1="1232" x2="515" y2="1288" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="965" y1="1232" x2="795" y2="1288" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="965" y1="1232" x2="1050" y2="1288" stroke="#7b8b93" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="190" y="1438" width="880" height="35" rx="10" fill="#f8f2e8" stroke="#d9ccb8" stroke-width="1.0"/>
<text x="630.0" y="1461" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#5d6c75">
<tspan x="630.0" dy="0">Optional modules can extend this stage, for example volcanic forcing that is still under development.</tspan>
</text>
<rect x="70" y="1540" width="1120" height="170" rx="22" fill="#eef5eb" stroke="#a8c59d" stroke-width="1.6"/>
<text x="630.0" y="1572" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#18242d">5. Outputs</text>
<rect x="180" y="1605" width="400" height="78" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="380" y="1638" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="380" dy="0">Main science outputs</tspan>
<tspan x="380" dy="20">allNDs.dat / rates.dat / jvalue.dat / opacity.dat</tspan>
<tspan x="380" dy="20">hydrostat*.out and species-specific dumps</tspan>
</text>
<rect x="680" y="1605" width="400" height="78" rx="16" fill="#fffaf2" stroke="#cdbda7" stroke-width="1.4"/>
<text x="880" y="1638" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#31424c">
<tspan x="880" dy="0">Supporting products</tspan>
<tspan x="880" dy="20">interpolated cross sections</tspan>
<tspan x="880" dy="20">photoMetric data and report files</tspan>
</text>
